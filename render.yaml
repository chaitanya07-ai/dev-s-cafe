# Render.com deployment config
# https://render.com — free tier available for backend + MongoDB Atlas for DB

services:
  # Backend (FastAPI)
  - type: web
    name: my-app-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: MONGO_URL
        sync: false   # set manually in Render dashboard
      - key: DB_NAME
        value: app_database
      - key: CORS_ORIGINS
        sync: false   # set to your frontend URL in dashboard

  # Frontend (React) — Render serves static sites for free
  - type: web
    name: my-app-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: build
    rootDir: frontend
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false   # set to your backend Render URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
